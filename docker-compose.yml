services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: weave
      POSTGRES_PASSWORD: weave
      POSTGRES_DB: weave
    ports:
      - "5432:5432"
    volumes:
      - weave_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weave"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  weave:
    build:
      context: .
      dockerfile: docker/Dockerfile.weave
    env_file: .env
    environment:
      DATABASE_URL: postgres://weave:weave@postgres:5432/weave
      REDIS_URL: redis://redis:6379
      API_BIND: 0.0.0.0:8080
      DATA_DIR: /data
      MIGRATIONS_PATH: /migrations
      # Cursor CLI is baked into the image; set CURSOR_API_KEY in .env. Langgraph fallback if cursor fails.
      STT_PROVIDER: ${STT_PROVIDER:-cloud}
      AGENT_BACKEND: ${AGENT_BACKEND:-cursor}
      CURSOR_WORKSPACE: /app/repo
    ports:
      - "8080:8080"
    volumes:
      - weave_data:/data
      - ./:/app/repo:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_AUDIO_CHUNK_MS: ${VITE_AUDIO_CHUNK_MS:-4000}
    ports:
      - "3000:80"
    depends_on:
      - weave
    restart: unless-stopped

volumes:
  weave_pg:
  weave_data:
